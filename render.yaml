# Render Blueprint — deploys ICKU as one web service (API + built React app).
# The database lives on SUPABASE (managed PostgreSQL), so there is no Render
# database here. Import this repo on render.com and it picks this file up
# automatically. Secrets (JWT) are generated for you; the two Supabase
# connection strings you paste in at deploy time (they hold your DB password,
# so they are NOT stored in this file).
services:
  - type: web
    name: icku
    runtime: node
    plan: free
    # --include=dev: NODE_ENV=production makes npm skip devDependencies, but the
    # client build needs vite/tailwind (dev deps), so force-install them here.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # Supabase connection string — Render prompts you to enter this when you
      # apply the blueprint (sync:false keeps it out of the repo, since it holds
      # your DB password). Use the Supabase "Session pooler" string (port 5432).
      - key: DATABASE_URL
        sync: false
